---
layout: default
---

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ site.title }}</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      max-width:700px;
      margin:auto;
      background:#fafafa;
      padding:40px;
    }

    h1{
      text-align:center;
    }

    .post{
      background:#fc03f4;
      padding:20px;
      margin:25px 0;
      border-radius:12px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
    }

    .date{
      color:gray;
      font-size:.9em;
    }

    img{
      max-width:100%;
      border-radius:10px;
    }
  </style>

</head>

<body>

<h1>{{ site.title }}</h1>

<p>{{ site.description }}</p>

{% for post in site.posts %}

<div class="post">

<h2>
<a href="{{ post.url }}">
{{ post.title }}
</a>
</h2>

<p class="date">
{{ post.date | date: "%B %d, %Y" }}
</p>

{{ post.excerpt }}

</div>

{% endfor %}

</body>

</html>
